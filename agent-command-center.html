<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Tech Helper — Agent Command Center</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0f1e; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #e8edf5; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  .topbar { background: #111827; border-bottom: 0.5px solid #1e2a45; padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  .logo { font-size: 13px; font-weight: 600; color: #3385ff; letter-spacing: 0.05em; text-transform: uppercase; white-space: nowrap; }
  .agent-tabs { display: flex; gap: 6px; flex: 1; overflow-x: auto; }
  .agent-tab { padding: 6px 14px; border-radius: 6px; border: 0.5px solid #1e2a45; background: transparent; color: #9ca3af; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 6px; white-space: nowrap; }
  .agent-tab:hover { background: #1e2a45; color: #e8edf5; }
  .agent-tab.active { background: #0066ff; border-color: #0066ff; color: #fff; }
  .agent-tab .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: 0.7; }
  .main { display: flex; flex: 1; overflow: hidden; }
  .sidebar { width: 210px; background: #111827; border-right: 0.5px solid #1e2a45; padding: 16px; flex-shrink: 0; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
  .sidebar-label { font-size: 10px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .agent-card { background: #0a0f1e; border: 0.5px solid #1e2a45; border-radius: 8px; padding: 10px 12px; cursor: pointer; transition: all 0.15s; }
  .agent-card:hover { border-color: #0066ff; }
  .agent-card.active { border-color: #0066ff; background: #050d1a; }
  .agent-name { font-size: 13px; font-weight: 500; color: #e8edf5; }
  .agent-role { font-size: 11px; color: #6b7280; margin-top: 2px; }
  .agent-status { font-size: 10px; color: #3385ff; margin-top: 6px; display: flex; align-items: center; gap: 4px; }
  .pulse { width: 5px; height: 5px; border-radius: 50%; background: #0066ff; }
  .deal-card { background: #0a0f1e; border: 0.5px solid #1e2a45; border-radius: 8px; padding: 10px 12px; margin-top: 8px; }
  .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .chat-header { padding: 14px 20px; border-bottom: 0.5px solid #1e2a45; background: #0d1526; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  .agent-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; color: #fff; flex-shrink: 0; }
  .agent-info .a-name { font-size: 14px; font-weight: 500; color: #e8edf5; }
  .agent-info .a-desc { font-size: 11px; color: #6b7280; margin-top: 1px; }
  .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: #1e2a45; border-radius: 2px; }
  .message { display: flex; gap: 10px; }
  .message.user { flex-direction: row-reverse; }
  .msg-avatar { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; }
  .msg-avatar.agent-av { color: #fff; }
  .msg-avatar.user-av { background: #1e2a45; color: #9ca3af; }
  .msg-bubble { max-width: 75%; padding: 10px 14px; border-radius: 10px; font-size: 13px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
  .message.agent .msg-bubble { background: #111827; border: 0.5px solid #1e2a45; color: #e8edf5; border-radius: 2px 10px 10px 10px; }
  .message.user .msg-bubble { background: #0066ff; color: #fff; border-radius: 10px 2px 10px 10px; }
  .msg-meta { font-size: 10px; color: #6b7280; margin-top: 4px; }
  .message.user .msg-meta { text-align: right; }
  .typing-wrap { display: flex; gap: 10px; }
  .typing { display: flex; align-items: center; gap: 5px; padding: 10px 14px; background: #111827; border: 0.5px solid #1e2a45; border-radius: 2px 10px 10px 10px; }
  .typing span { width: 5px; height: 5px; border-radius: 50%; background: #3385ff; animation: blink 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100% { opacity: 0.2; } 40% { opacity: 1; } }
  .input-area { padding: 16px 20px; border-top: 0.5px solid #1e2a45; background: #0d1526; flex-shrink: 0; }
  .quick-actions { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
  .quick-btn { padding: 5px 10px; border-radius: 6px; border: 0.5px solid #1e2a45; background: #111827; color: #9ca3af; font-size: 11px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .quick-btn:hover { border-color: #0066ff; color: #3385ff; background: #0a1a3a; }
  .input-row { display: flex; gap: 10px; align-items: flex-end; }
  .input-wrap { flex: 1; background: #111827; border: 0.5px solid #1e2a45; border-radius: 10px; padding: 10px 14px; display: flex; align-items: center; transition: border-color 0.15s; }
  .input-wrap:focus-within { border-color: #0066ff; }
  .input-wrap textarea { flex: 1; background: transparent; border: none; outline: none; color: #e8edf5; font-size: 13px; resize: none; font-family: inherit; line-height: 1.5; max-height: 120px; }
  .input-wrap textarea::placeholder { color: #4b5563; }
  .send-btn { width: 38px; height: 38px; border-radius: 8px; background: #0066ff; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; flex-shrink: 0; }
  .send-btn:hover { background: #3385ff; }
  .send-btn:disabled { background: #1e2a45; cursor: not-allowed; }
  .send-btn svg { width: 16px; height: 16px; fill: #fff; }
  .delegate-badge { display: inline-flex; align-items: center; gap: 4px; background: #0a1a3a; border: 0.5px solid #0066ff; border-radius: 4px; padding: 2px 7px; font-size: 10px; color: #3385ff; }
  .empty-state { text-align: center; padding: 60px 20px; color: #4b5563; margin: auto; }
  .empty-state .big-initial { font-size: 48px; font-weight: 700; margin-bottom: 12px; opacity: 0.3; }
  .empty-state .e-name { font-size: 15px; font-weight: 500; color: #6b7280; margin-bottom: 6px; }
  .empty-state .e-desc { font-size: 12px; color: #4b5563; }
  @media (max-width: 600px) { .sidebar { display: none; } }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">AI Tech Helper</div>
  <div class="agent-tabs" id="agentTabs"></div>
</div>

<div class="main">
  <div class="sidebar">
    <div>
      <div class="sidebar-label">Your Team</div>
      <div id="sidebarAgents" style="display:flex;flex-direction:column;gap:8px;margin-top:8px;"></div>
    </div>
    <div style="margin-top:auto;">
      <div class="sidebar-label">Active Deal</div>
      <div class="deal-card">
        <div style="font-size:12px;font-weight:500;color:#e8edf5;">918 Construction</div>
        <div style="font-size:11px;color:#6b7280;margin-top:2px;">Jerod Hicks</div>
        <div style="font-size:10px;color:#f59e0b;margin-top:6px;display:flex;align-items:center;gap:4px;">
          <span style="width:5px;height:5px;border-radius:50%;background:#f59e0b;display:inline-block;"></span>
          Proposal sent May 2026
        </div>
      </div>
    </div>
  </div>

  <div class="chat-area">
    <div class="chat-header" id="chatHeader"></div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <div class="quick-actions" id="quickActions"></div>
      <div class="input-row">
        <div class="input-wrap">
          <textarea id="userInput" placeholder="Message your agent..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        </div>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
const AGENTS = {
  marcus: {
    name: "Marcus", role: "CEO", desc: "Strategy, delegation & reporting", initials: "M", color: "#7c3aed",
    quickActions: ["Weekly priorities", "Review pipeline", "Delegate to team", "Business strategy"],
    systemPrompt: `You are Marcus, CEO of AI Tech Helper LLC. You report directly to Will Henderson, the owner and founder. Your job is to run the business operationally so Will can focus on growth.

Your four core responsibilities:
1. Big picture strategy — Help Will think through business direction, priorities, and decisions. Challenge assumptions. Identify opportunities and risks. Always be thinking 3 steps ahead.
2. Delegating & task management — Know what Alex (Sales), Jordan (Marketing), and Riley (Operations) are responsible for. When Will brings you a goal or problem, break it into tasks and assign them to the right person. Be specific about what needs to happen and when. Use "→ Alex:", "→ Jordan:", or "→ Riley:" to show delegations clearly.
3. Reading results & finding improvements — When Will shares numbers, feedback, or updates, analyze them. Identify what's working, what's not, and what to change. Tell him what it means and what to do about it.
4. Reporting to Will — Give clear, concise updates. No fluff. Lead with the most important thing. Flag problems early. Celebrate wins fast and move on.

Your team: Alex (Sales — proposals, cold email, closing deals), Jordan (Marketing — social content, newsletter, ads, brand voice), Riley (Operations — GHL builds, Dakota prompts, client onboarding).

About AI Tech Helper LLC: AI implementation agency based in Tulsa, Oklahoma. Products: AI Receptionist Core ($500 setup + $350/mo) and AI Receptionist Pro ($1,000 setup + $500/mo). Automation add-ons: Contract & Waiver, Appointment Reminder, Review & Referral, Invoice Follow-Up, Estimate Follow-Up, New Client Onboarding. All services white-labeled — never mention GoHighLevel, Make.com, or underlying platforms to clients. AI receptionist persona named Dakota. Demo line: +1 572-220-4756. Active deal: 918 Construction — contact Jerod Hicks, proposal sent May 2026.

Communicate casually and directly. No corporate speak. Lead with the answer. Short sentences.`
  },
  alex: {
    name: "Alex", role: "Sales", desc: "Proposals, cold email & deal strategy", initials: "A", color: "#0066ff",
    quickActions: ["Write cold email", "Build proposal", "Follow-up sequence", "Deal strategy for 918"],
    systemPrompt: `You are Alex, Sales Manager at AI Tech Helper LLC. You report to Marcus (CEO) and Will Henderson (owner). Your job is to drive revenue — from first touch to closed deal.

Your responsibilities:
1. Cold email writing — When given a lead (business name, city, industry), write a personalized cold email ready for Make.com outreach. Sound like a real person sent it. Casual, specific, never generic.
2. Follow-up sequences — Write email 2 and email 3 for leads that don't respond. Escalate urgency naturally without being pushy.
3. Proposals — Build clear proposals based on client info. Lead with their problem, not the product. Use approved packages and pricing.
4. Deal strategy — When a deal is stalling, diagnose why and give Will a specific action plan. Tell him exactly what to say or do.
5. Objection handling — When a prospect pushes back on price, timing, or need, give Will the exact response to send or say.
6. Pipeline reporting — Tell Will what to prioritize, what's at risk, and the next move on each deal.

Packages & Pricing:
- AI Receptionist Core — $500 setup + $350/mo (24/7 voice AI, lead qualification, appointment booking, FAQ handling, CRM integration)
- AI Receptionist Pro — $1,000 setup + $500/mo (everything in Core + AI text messaging, website chat agent, automated lead follow-up, lead nurturing, multi-channel communication)
- Automation Add-Ons — quoted per client: Contract & Waiver, Appointment Reminder, Review & Referral, Invoice Follow-Up, Estimate Follow-Up, New Client Onboarding

Active deal: 918 Construction — Contact: Jerod Hicks. Proposal sent May 2026. Quoted $1,000-$3,000 setup, $500-$1,500/mo. GHL and Make.com named explicitly in this proposal only.

Rules: Never mention GoHighLevel, Make.com, or underlying platforms to clients (918 Construction is the only exception). Never state pricing on calls — redirect to booking a consultation. Dakota is the AI receptionist — demo line +1 572-220-4756.

Communicate casually and directly. When given a lead, write the email — don't ask 10 questions first. Make reasonable assumptions and go.`
  },
  jordan: {
    name: "Jordan", role: "Marketing", desc: "Content, social & brand voice", initials: "J", color: "#059669",
    quickActions: ["Write LinkedIn post", "Newsletter entry", "Instagram content", "Ad copy"],
    systemPrompt: `You are Jordan, Marketing Manager at AI Tech Helper LLC. You report to Marcus (CEO) and Will Henderson (owner). Your job is to build the brand, grow the audience, and fill the top of the pipeline with warm leads.

Your responsibilities:
1. Social media content — Write ready-to-post content for LinkedIn, Facebook, and Instagram. Sound like a real person — confident, local, knowledgeable. Never corporate. Speak directly to small business owners in trades, home services, and local businesses. Always give 3 variations.
2. Newsletter / AI Hub — Write engaging newsletter entries positioning Will as the go-to AI guy in Tulsa. Conversational and practical.
3. Ad copy — Facebook and Google ad copy. Lead with the pain point. Short and punchy. Clear CTA.
4. Brand voice — Casual, confident, locally grounded, direct. Real person texting, not a marketer. Any client-facing copy should match this voice.
5. Content strategy — Give specific plans with topics, angles, and timing. Not just ideas — a content calendar Will can execute.

Brand: AI Tech Helper LLC, Tulsa Oklahoma. Helps SMBs replace their front office with AI. Target audience: Local SMB owners in trades, home services, professional services. Brand colors: #0a0f1e (dark navy), #0066ff (electric blue), #3385ff (blue-light accent).

Rules: Never mention GoHighLevel, Make.com, or underlying platforms. Never sound like AI wrote it — no buzzwords, no em dashes, no fluff. Always write copy ready to post — no placeholders, no "insert your CTA here."

Communicate casually and directly. When Will asks for content, produce it. Ask one question max if clarification is truly needed.`
  },
  riley: {
    name: "Riley", role: "Operations", desc: "Onboarding, builds & Dakota prompts", initials: "R", color: "#d97706",
    quickActions: ["GHL build checklist", "Write Dakota prompt", "Onboarding workflow", "Client check-in template"],
    systemPrompt: `You are Riley, Operations Manager at AI Tech Helper LLC. You report to Marcus (CEO) and Will Henderson (owner). Your job is to make sure every client gets built right, goes live on time, and stays happy.

Your responsibilities:
1. GHL build checklists — Take the client onboarding form and output a complete GHL sub-account build checklist. Every step, in order, nothing assumed. Client-specific every time.
2. Dakota prompt drafts — Using the completed onboarding form, write Dakota's full knowledge base and call handling prompt for that client. Include: business info, services, FAQs, what to say, what never to say, and the singular goal of booking a consultation.
3. Onboarding workflows — Define exactly what happens after a client signs. What gets sent, what gets built, in what order, on what timeline. Make it repeatable and airtight.
4. Client communication templates — Write messages clients receive at every stage: welcome after signing, build in progress update, go-live notification, 30-day check-in, monthly update. Professional but warm. Never robotic.
5. Monthly check-ins — When Will shares client results, identify what's working, what needs attention, and what add-ons or upgrades make sense to offer.

Delivery stack: GoHighLevel (GHL) — Voice AI (Dakota), AI Communications Agent, CRM, calendar, workflows, white-label dashboard. Dakota's one goal on every call: book the consultation. Never state pricing. Never go off-topic.

Packages: AI Receptionist Core ($500 setup + $350/mo) and AI Receptionist Pro ($1,000 setup + $500/mo). Add-ons: Contract & Waiver, Appointment Reminder, Review & Referral, Invoice Follow-Up, Estimate Follow-Up, New Client Onboarding.

Rules: Every checklist and prompt must be client-specific — no generic templates. Flag anything missing from the onboarding form before starting the build. Onboarding form is the source of truth.

Communicate casually and directly. When Will brings a completed onboarding form, produce the checklist and Dakota prompt without unnecessary back and forth. If something critical is missing, flag it in one clear list.`
  }
};

let currentAgent = 'marcus';
let conversations = { marcus: [], alex: [], jordan: [], riley: [] };
let isLoading = false;

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function now() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function renderTabs() {
  document.getElementById('agentTabs').innerHTML = Object.entries(AGENTS).map(([key, a]) =>
    `<button class="agent-tab ${key === currentAgent ? 'active' : ''}" onclick="switchAgent('${key}')">
      <span class="dot"></span>${a.name}
    </button>`
  ).join('');
}

function renderSidebar() {
  document.getElementById('sidebarAgents').innerHTML = Object.entries(AGENTS).map(([key, a]) =>
    `<div class="agent-card ${key === currentAgent ? 'active' : ''}" onclick="switchAgent('${key}')">
      <div class="agent-name">${a.name}</div>
      <div class="agent-role">${a.role}</div>
      <div class="agent-status"><span class="pulse"></span>Ready</div>
    </div>`
  ).join('');
}

function renderHeader() {
  const a = AGENTS[currentAgent];
  document.getElementById('chatHeader').innerHTML = `
    <div class="agent-avatar" style="background:${a.color}">${a.initials}</div>
    <div class="agent-info">
      <div class="a-name">${a.name} — ${a.role}</div>
      <div class="a-desc">${a.desc}</div>
    </div>`;
}

function renderQuickActions() {
  document.getElementById('quickActions').innerHTML = AGENTS[currentAgent].quickActions.map(q =>
    `<button class="quick-btn" onclick="useQuick('${q}')">${q}</button>`
  ).join('');
}

function formatContent(text) {
  return text.replace(/→ (Alex|Jordan|Riley|Marcus):/g,
    '<span class="delegate-badge">→ $1</span>');
}

function renderMessages() {
  const msgs = document.getElementById('messages');
  const conv = conversations[currentAgent];
  const a = AGENTS[currentAgent];
  if (conv.length === 0) {
    msgs.innerHTML = `<div class="empty-state">
      <div class="big-initial">${a.initials}</div>
      <div class="e-name">${a.name} is ready</div>
      <div class="e-desc">${a.desc}</div>
    </div>`;
    return;
  }
  msgs.innerHTML = conv.map(m => `
    <div class="message ${m.role}">
      <div class="msg-avatar ${m.role === 'agent' ? 'agent-av' : 'user-av'}" style="${m.role === 'agent' ? `background:${a.color}` : ''}">${m.role === 'agent' ? a.initials : 'W'}</div>
      <div>
        <div class="msg-bubble">${formatContent(m.content)}</div>
        <div class="msg-meta">${m.time}</div>
      </div>
    </div>`).join('');
  msgs.scrollTop = msgs.scrollHeight;
}

function switchAgent(key) {
  currentAgent = key;
  renderTabs();
  renderSidebar();
  renderHeader();
  renderQuickActions();
  renderMessages();
  document.getElementById('userInput').placeholder = `Message ${AGENTS[key].name}...`;
}

function useQuick(text) {
  document.getElementById('userInput').value = text;
  sendMessage();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  conversations[currentAgent].push({ role: 'user', content: text, time: now() });
  input.value = '';
  input.style.height = 'auto';
  renderMessages();

  const msgs = document.getElementById('messages');
  const typingEl = document.createElement('div');
  typingEl.className = 'typing-wrap';
  typingEl.innerHTML = `
    <div class="msg-avatar agent-av" style="background:${AGENTS[currentAgent].color};width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;">${AGENTS[currentAgent].initials}</div>
    <div class="typing"><span></span><span></span><span></span></div>`;
  msgs.appendChild(typingEl);
  msgs.scrollTop = msgs.scrollHeight;

  isLoading = true;
  document.getElementById('sendBtn').disabled = true;

  try {
    const apiMessages = conversations[currentAgent].map(m => ({
      role: m.role === 'agent' ? 'assistant' : 'user',
      content: m.content
    }));

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: AGENTS[currentAgent].systemPrompt,
        messages: apiMessages
      })
    });

    const data = await res.json();
    const reply = data.content?.[0]?.text || 'Something went wrong. Try again.';
    typingEl.remove();
    conversations[currentAgent].push({ role: 'agent', content: reply, time: now() });
    renderMessages();
  } catch(e) {
    typingEl.remove();
    conversations[currentAgent].push({ role: 'agent', content: 'Connection error. Try again.', time: now() });
    renderMessages();
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
}

switchAgent('marcus');
</script>
</body>
</html>
